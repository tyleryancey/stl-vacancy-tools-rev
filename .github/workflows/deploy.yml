name: Build & Deploy

# Rebuilds the data artifacts from the public vacancy CSV and deploys to GitHub
# Pages. Runs on push to main, weekly (to pick up CSV updates), and on demand.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # --- tippecanoe (felt fork; mapbox/tippecanoe is archived) ---
      - name: Cache tippecanoe binary
        id: tippecanoe-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/tippecanoe
          key: tippecanoe-felt-2.79.0
      - name: Build tippecanoe (on cache miss)
        if: steps.tippecanoe-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          # Pin the tag so the built binary actually matches the cache key label.
          git clone --depth 1 --branch 2.79.0 https://github.com/felt/tippecanoe /tmp/tippecanoe
          make -C /tmp/tippecanoe -j2
          mkdir -p ~/.local/bin && cp /tmp/tippecanoe/tippecanoe ~/.local/bin/
      - name: Add tippecanoe to PATH + ensure runtime libs
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          sudo apt-get install -y libsqlite3-0 || true

      # Download the source CSV first — data:geometry (below) reads it to know
      # which parcels to keep.
      - run: npm run data:download

      # --- parcel geometry: durable seed from a Release asset (boundaries are
      #     static; refreshed only by refresh-geometry.yml). Fallback: fetch live. ---
      - name: Seed parcel geometry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/raw
          if gh release download geometry --repo "$GITHUB_REPOSITORY" \
               --pattern parcel_geometry.json --output data/raw/parcel_geometry.json 2>/dev/null; then
            echo "Seeded geometry from release."
          else
            echo "No geometry release found — fetching from city ArcGIS (first run)."
            npm run data:geometry
          fi

      # --- data pipeline ---
      - run: npm run data
      - run: npm run data:assert # fails loudly if the polygon layer is empty
      - run: npm run tiles

      # Optional re-scored caches (sparklines + current-condemned set), published
      # by refresh-timelines.yml. Absent → the client falls back to the CSV flag /
      # live recompute, so never fail here.
      - name: Seed re-scored caches (optional)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download timelines --repo "$GITHUB_REPOSITORY" \
            --pattern timelines.json --output public/data/timelines.json 2>/dev/null \
            && echo "Seeded pre-baked timelines." || echo "No timelines cache — client will live-recompute."
          gh release download timelines --repo "$GITHUB_REPOSITORY" \
            --pattern condemned.json --output public/data/condemned.json 2>/dev/null \
            && echo "Seeded re-scored condemned set." || echo "No condemned cache — map uses the CSV flag."

      - name: Build
        env:
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
